<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: #1d2671;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 14px;
        }

        input {
            width: 85%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        input:focus {
            border-color: #c33764;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(90deg, #1d2671, #c33764);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .safe {
            background: #d4edda;
            color: #155724;
        }

        .phishing {
            background: #f8d7da;
            color: #721c24;
        }

        ul {
            margin-top: 15px;
            text-align: left;
            padding-left: 20px;
            color: #333;
        }

        li {
            margin: 5px 0;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡 Phishing URL Detector</h1>
    <p>Check whether a website link looks safe or suspicious.</p>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL here..." required>
        <br>
        <button type="submit">Analyze URL</button>
    </form>

    {% if result %}
        <div class="result {% if result == 'Safe Website' %}safe{% else %}phishing{% endif %}">
            {{ result }}
        </div>

        <ul>
            {% for reason in reasons %}
                <li>{{ reason }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <div class="footer">
        Cyber Security Project | Made by Rudraksh Girnari
    </div>
</div>

</body>
</html>
